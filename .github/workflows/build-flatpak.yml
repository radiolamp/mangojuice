name: Flatpak Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: [ "main" ]
    types: [ "review_requested", "ready_for_review" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  flatpak:
    name: "Build ${{ matrix.arch }}"
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --privileged
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y flatpak flatpak-builder

      - name: Setup QEMU binfmt (aarch64 only)
        if: matrix.arch == 'aarch64'
        run: |
          dnf install -y qemu-user-static
          mount binfmt_misc -t binfmt_misc /proc/sys/fs/binfmt_misc 2>/dev/null || true
          if [ -f /proc/sys/fs/binfmt_misc/register ]; then
            /usr/lib/systemd/systemd-binfmt 2>/dev/null || \
              find /usr/lib/binfmt.d/ -name 'qemu-aarch64*' -exec sh -c 'cat "$1" > /proc/sys/fs/binfmt_misc/register' _ {} \;
          fi
          echo "QEMU aarch64 binfmt status:"
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 2>/dev/null || echo "NOT REGISTERED"

      - name: Setup Flatpak
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --arch=${{ matrix.arch }} flathub org.gnome.Platform//49
          flatpak install --user -y --arch=${{ matrix.arch }} flathub org.gnome.Sdk//49
          flatpak install --user -y flathub org.freedesktop.Platform.VulkanLayer.MangoHud//25.08

      - name: Build
        run: |
          flatpak-builder --user --force-clean --arch=${{ matrix.arch }} build-dir build-aux/flatpak/io.github.radiolamp.mangojuice.json

      - name: Create Bundle
        run: |
          flatpak build-export --arch=${{ matrix.arch }} repo build-dir
          flatpak build-bundle --arch=${{ matrix.arch }} repo io.github.radiolamp.mangojuice-${{ matrix.arch }}.flatpak io.github.radiolamp.mangojuice

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangojuice-${{ matrix.arch }}.flatpak
          path: io.github.radiolamp.mangojuice-${{ matrix.arch }}.flatpak
